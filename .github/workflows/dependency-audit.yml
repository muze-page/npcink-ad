name: Dependency Audit

on:
  pull_request:
    paths:
      - ".github/workflows/dependency-audit.yml"
      - "composer.json"
      - "composer.lock"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none
          tools: composer:v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Reject high or critical frontend advisories
        run: pnpm run audit:dependencies

      - name: Audit Composer lock file
        run: composer audit --locked --no-interaction
