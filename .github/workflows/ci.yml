name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.1'
          - '8.4'
    env:
      NPCINK_AD_BUNDLE_MAX_INDEX_JS_KB: 40
      NPCINK_AD_BUNDLE_MAX_INDEX_CSS_KB: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2, wp-cli

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install --yes gettext

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gate
        run: bash scripts/release-gate.sh

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: npcink-ad-php-${{ matrix.php-version }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  playground-minimum:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Download PHP 8.1 release artifact
        uses: actions/download-artifact@v7
        with:
          name: npcink-ad-php-8.1
          path: dist

      - name: Run minimum WordPress Playground matrix
        run: WP_VERSION=6.5 PHP_VERSION=8.1 tests/playground/run.sh

  editor-e2e:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Download PHP 8.1 release artifact
        uses: actions/download-artifact@v7
        with:
          name: npcink-ad-php-8.1
          path: dist

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run minimum editor E2E
        run: WP_VERSION=6.5 PHP_VERSION=8.1 pnpm run test:e2e:editor

      - name: Run current editor E2E
        run: WP_VERSION=7.0 PHP_VERSION=8.5 pnpm run test:e2e:editor
