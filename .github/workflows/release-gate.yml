name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      NPCINK_AD_BUNDLE_MAX_BLOCK_EDITOR_JS_KB: 16
      NPCINK_AD_BUNDLE_MAX_PROMOTION_EDITOR_JS_KB: 41
      NPCINK_AD_BUNDLE_MAX_EDITOR_JS_TOTAL_KB: 52
      NPCINK_AD_BUNDLE_MAX_EDITOR_CSS_KB: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag belongs to master
        if: github.ref_type == 'tag'
        run: |
          if ! git show-ref --verify --quiet refs/remotes/origin/master; then
            echo 'The checkout does not contain origin/master.' >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/master; then
            echo "Tag $GITHUB_REF_NAME does not point to a commit contained in master." >&2
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: pdo_sqlite, sqlite3
          tools: composer:v2, wp-cli

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install --yes gettext

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gate
        run: bash scripts/release-gate.sh

      - name: Run current WordPress Playground matrix
        run: WP_VERSION=latest PHP_VERSION=8.5 tests/playground/run.sh

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify Playground startup retry contract
        run: tests/e2e/run-with-playground-startup-retry.test.sh

      - name: Run classic and block theme compatibility matrix
        run: tests/e2e/run-theme-matrix.sh

      - name: Upload Playground failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: npcink-ad-release-playground-diagnostics
          path: test-results/playground-startup
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: npcink-ad-release
          path: |
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error

  publish-prerelease:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@v7
        with:
          name: npcink-ad-release
          path: dist

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            is_prerelease="$(gh release view "$GITHUB_REF_NAME" --json isPrerelease --jq '.isPrerelease')"
            if [[ "$is_prerelease" != 'true' ]]; then
              echo "Release $GITHUB_REF_NAME is already final; leaving it unchanged."
              exit 0
            fi
            gh release edit "$GITHUB_REF_NAME" --title "Npcink Ad ${GITHUB_REF_NAME#v}"
            gh release upload "$GITHUB_REF_NAME" dist/*.zip dist/*.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.sha256 \
              --prerelease \
              --verify-tag \
              --title "Npcink Ad ${GITHUB_REF_NAME#v}" \
              --generate-notes
          fi
