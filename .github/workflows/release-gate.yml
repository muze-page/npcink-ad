name: Release Gate

on:
  workflow_dispatch:
    inputs:
      preview_path:
        description: 'Optional E2E preview URL/path'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      MAGICK_AD_E2E_PREVIEW_PATH: ${{ github.event.inputs.preview_path || vars.MAGICK_AD_E2E_PREVIEW_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gate
        run: bash scripts/release-gate.sh

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: magick-ad-release
          path: dist/*.zip

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
