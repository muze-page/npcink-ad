name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      NPCINK_AD_BUNDLE_MAX_INDEX_JS_KB: 40
      NPCINK_AD_BUNDLE_MAX_INDEX_CSS_KB: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2, wp-cli

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install --yes gettext

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gate
        run: bash scripts/release-gate.sh

      - name: Run current WordPress Playground matrix
        run: WP_VERSION=latest PHP_VERSION=8.5 tests/playground/run.sh

      - name: Upload release zip
        uses: actions/upload-artifact@v7
        with:
          name: npcink-ad-release
          path: dist/*.zip
          if-no-files-found: error
